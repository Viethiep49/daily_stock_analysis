# Chan Theory Strategy / Chan luan
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.

name: chan_theory
display_name: Ly Thuyet Phan Doan
description: Phan tich dua tren ly thuyet phan doan xu huong.
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [Chan luan, Chan luanphan tich]
default_priority: 70
market_regimes: [volatile]

instructions: |
  **Ly thuyet Phan Doan (Chan Theory / Zen Channel Theory)**

  Khung chinh: Phan hinh -> But -> Doan -> Trung tam -> Xu huong

  ## Buoc phan tich

  ### 1. Xac dinh cau truc gia (nhan dien trung tam)
  - Su dung `get_daily_history` lay du lieu 60 ngay.
  - Nhan dien day cao/thap gan day, xac dinh hien tai o
    **trung tam dao dong** (1 trung tam tro len) hay **doan xu huong** (roi trung tam len/xuong).
  - Trung tam: 3 doan lien tiep dao dong giao nhau, gia dao dong trong pham vi nay.
  - Xu huong: 3 trung tam cung cap lien tiep di chuyen cung huong.

  ### 2. Xac dinh phan ky (tin hieu uu tien cao nhat)
  - **Phan ky dinh**: Gia tao dinh moi nhung dien tich cot MACD giam -> Tin hieu ban/giam canh.
  - **Phan ky day**: Gia tao day moi nhung dien tich cot MACD xanh giam -> Tin hieu mua/tang canh.
  - Su dung `analyze_trend` lay du lieu MACD, so sanh voi day cao/thap gia.

  ### 3. Xac dinh diem mua ban
  - **Mua mot** (manh nhat): Trong xu huong giam, trung tam cuoi cung xuat hien phan ky day.
  - **Mua hai**: Sau khi roi trung tam giam, lan dieu chinh dau tien khong vuot qua dinh trung tam.
  - **Mua ba**: Sau khi dao dong trung tam, vuot len (khong quay lai trung tam).
  - **Ban mot/ban hai/ban ba**: Cau truc doi xung, huong nguoc lai.
  - Cap diem mua ban hien tai quyet dinh kich co canh co.

  ### 4. Cap va canh co
  - Diem mua ban cap ngay co the canh nang (30-50%).
  - Diem mua ban cap tuan co the canh lon (50-80%).
  - Cong huyen nhieu cap (ngay + tuan cung huong) thi tin hieu manh nhat.

  ### 5. Yeu cau dau ra
  - Xac dinh ro: xu huong tang/xu huong giam/dao dong trung tam.
  - Chi ra co tin hieu phan ky khong va cap phan ky.
  - Dua ra loai diem mua ban hien tai (mua mot/mua hai/mua ba,...), neu khong thi ghi "chua co diem mua ban ro rang".
  - Dung sai o day truoc (khi mua) hoac dinh truoc (khi ban).

  ## Dieu chinh diem:
  - Phan ky day + tin hieu mua mot: `sentiment_score +15`
  - Mua hai/mua ba cong huyen: `sentiment_score +10`
  - Trung tam dao dong khong huong ro: `sentiment_score giu nguyen`
  - Phan ky dinh / xu huong giam: `sentiment_score -15`

