# One Yang Three Yin Strategy / Mot Duong Ba Am
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: Mot Duong Ba Am
description: Nhan dien mau hinh mot nen tang manh sau ba nen giam lien tiep.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [mot duong ba am, mot duong xuyen ba am]
default_priority: 110

instructions: |
  **Mot Duong Ba Am (One Yang Three Yin Strategy)**

  Dinh hinh dang (5 ngay giao dich gan nhat):

  1. **Ngay 1**: Nen tang lon (gia dong cua > gia mo cua, than > 2% gia co phan).
  2. **Ngay 2-4**: Ba nen giam lien tiep hoac K-line nho:
     - Moi K-line gia thap nhat khong pha vo gia mo cua ngay 1.
     - Khoi luong phai giam dan (khoi luong ty < 0.8).
     - Ba K-line phai dong cua trong pham vi than ngay 1.
  3. **Ngay 5**: Them mot nen tang, gia dong cua vuot qua gia dong cua ngay 1.

  Cach su dung cong cu danh gia:

  1. Su dung `get_daily_history` lay du lieu 10 ngay gan nhat.
  2. Kiem tra 5 K-line cuoi co phu hop dang tren khong.
  3. Su dung `analyze_trend` xac nhan sap xep tang (MA5 > MA10 > MA20).

  ## Dieu chinh diem:
  - Dang thanh cong + xu huong tang: sentiment_score +15
  - Dang thanh cong nhung xu huong khong ro: sentiment_score +5
  - Diem mua ly tuong o gan gia dong cua ngay 5, dung sai o duoi gia mo cua ngay 1.

