# One Yang Three Yin Strategy / 一阳夹三阴
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: Mot Duong Ba Am
description: Nhan dien mau hinh mot nen tang manh sau ba nen giam lien tiep.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [一阳穿三阴, 一阳夹三阴]
default_priority: 110

instructions: |
  **一阳夹三阴（One Yang Three Yin Strategy）**

  形态定义（最近 5 个交易日）：

  1. **第1日**：大阳线（收盘价 > 开盘价，实体 > 股价的 2%）。
  2. **第2-4日**：连续三根阴线或小K线：
     - 每根K线最低价不跌破第1日开盘价。
     - 成交量应逐步萎缩（量比 < 0.8）。
     - 三根K线应收在第1日实体范围内。
  3. **第5日**：又一根阳线，收盘价突破第1日收盘价。

  如何使用工具评估：

  1. 使用 `get_daily_history` 获取最近 10 日数据。
  2. 检查最后 5 根K线是否符合上述形态。
  3. 使用 `analyze_trend` 确认多头排列（关联理念2：趋势交易，MA5 > MA10 > MA20）。

  评分调整：
  - 形态成立 + 趋势看多：sentiment_score +15
  - 形态成立但趋势不明：sentiment_score +5
  - 在 `pattern_analysis` 和 `buy_reason` 中注明"一阳夹三阴"。
  - 理想买点设在第5日收盘价附近，止损设在第1日开盘价下方。

# Vietnam market parameters (HOSE/HNX)
vn_market:
  price_limit_hose: 0.07          # HOSE daily limit +/-7%
  price_limit_hnx: 0.10           # HNX daily limit +/-10%
  lot_size: 100                   # Minimum lot = 100 shares
  settlement_rule: "T+2.5"        # Shares available to sell from T+2 afternoon
  short_selling: false            # Not legally permitted in Vietnam
  Vietnam Market Rules (HOSE/HNX):
  - Price limit: HOSE +/-7% / HNX +/-10% per session.
  - T+2.5 settlement: shares bought on T are only sellable from 13:00 on T+2.
    Do NOT generate sell signals for stocks bought within the last 2 trading days.
  - Lot size: all quantities must be multiples of 100 shares.
  - Short selling is not permitted. Long positions only.
