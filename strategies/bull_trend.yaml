# Default Bull Trend Strategy / Xu huong tang mac dinh

name: bull_trend
display_name: Xu Huong Tang
description: Chien luoc mac dinh: nhan dien xep hang MA tang, xu huong tiep dien va diem mua hoi.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [xu huong, xu huong tang, phan tich xu huong]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **Chien luoc Xu Huong Tang Mac Dinh (Default Bull Trend Strategy)**

  Canh ung dung:
  - Chien luoc mac dinh cho phan tich co phieu thong thuong.
  - Uu tiem tim co hoi "xu huong tang + rui ro kiem soat + khong duoi theo gia".

  Khung phan tich:

  1. **Xac nhan xu huong (uu tien cao nhat)**
     - Su dung `analyze_trend` xac dinh sap xep MA5/MA10/MA20.
     - MA5 >= MA10 >= MA20 va do doc MA20 huong len, xem la cau truc tang.
     - Neu gia pha vo MA20 ro ret, giam trong luong tang.

  2. **Vi tri va nhịp**
     - Uu tiem "hut lai khong pha" thay vi "duoi theo o vi tri cao".
     - Khi gia cach MA5/MA10 qua xa, khuyen nghi cho hut lai.
     - Khi tang luong vuot qua khang cu hieu qua, co the tang muc thang.

  3. **Xac nhan luong gia**
     - Su dung `get_daily_history` kiem tra ngay vuot/hoi phuc co tang luong khong.
     - Tang co luong can than, dung tang nhung tang luong can canh giac phan ky.

  4. **Dau ra khuyen cai giao dich**
     - Dua ra huong "mua/quan sat/giam canh" ro rang va dieu kien kich hoat.
     - Bat buoc dua ra muc dung sai (vi du: duoi MA20 hoac day cau truc).
     - Neu khong co uu the ro, ghi ro "tam thoi khong hanh dong", tranh giao dich qua muc.

  ## Dieu chinh diem:
  - Sap xep tang + do manh xu huong tot: `sentiment_score +12`
  - Hut lai MA chinh roi on dinh: `sentiment_score +8`
  - Tang luong vuot khang cu chinh: `sentiment_score +10`
  - Pha vo MA20 hoac xu huong yeu di: `sentiment_score -12`

# Vietnam market parameters (HOSE/HNX)
vn_market:
  price_limit_hose: 0.07          # HOSE daily limit +/-7%
  price_limit_hnx: 0.10           # HNX daily limit +/-10%
  lot_size: 100                   # Minimum lot = 100 shares
  settlement_rule: "T+2.5"        # Shares available to sell from T+2 afternoon
  short_selling: false            # Not legally permitted in Vietnam
  Vietnam Market Rules (HOSE/HNX):
  - Price limit: HOSE +/-7% / HNX +/-10% per session.
  - T+2.5 settlement: shares bought on T are only sellable from 13:00 on T+2.
    Do NOT generate sell signals for stocks bought within the last 2 trading days.
  - Lot size: all quantities must be multiples of 100 shares.
  - Short selling is not permitted. Long positions only.
