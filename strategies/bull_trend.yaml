# Default Bull Trend Strategy / 默认多头趋势

name: bull_trend
display_name: Xu Huong Tang
description: Chien luoc mac dinh: nhan dien xep hang MA tang, xu huong tiep dien va diem mua hoi.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [趋势, 趋势分析, 多头趋势]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **默认多头趋势（Default Bull Trend Strategy）**

  适用场景：
  - 常规个股分析的默认策略。
  - 优先寻找“趋势向上 + 风险可控 + 不追高”的机会。

  分析框架：

  1. **趋势确认（优先级最高）**
     - 使用 `analyze_trend` 判断 MA5/MA10/MA20 排列。
     - MA5 >= MA10 >= MA20 且 MA20 斜率向上，视为多头结构。
     - 若价格显著跌破 MA20，则降低看多权重。

  2. **位置与节奏**
     - 优先“回踩不破”而非“高位追涨”。
     - 当价格距离 MA5/MA10 过远时，提示等待回踩。
     - 放量突破有效阻力时可提高胜率评级。

  3. **量价验证**
     - 使用 `get_daily_history` 检查突破日/反弹日是否放量。
     - 缩量上涨需谨慎，放量滞涨需警惕分歧。

  4. **交易建议输出**
     - 输出明确的“买入/观望/减仓”倾向及触发条件。
     - 必须给出止损参考（如 MA20 下方或结构低点）。
     - 若无清晰优势，明确写“暂不出手”，避免过度交易。

  评分调整建议：
  - 多头排列 + 趋势强度良好：`sentiment_score +12`
  - 回踩关键均线后企稳：`sentiment_score +8`
  - 放量突破关键阻力：`sentiment_score +10`
  - 跌破 MA20 或趋势转弱：`sentiment_score -12`

# Vietnam market parameters (HOSE/HNX)
vn_market:
  price_limit_hose: 0.07          # HOSE daily limit +/-7%
  price_limit_hnx: 0.10           # HNX daily limit +/-10%
  lot_size: 100                   # Minimum lot = 100 shares
  settlement_rule: "T+2.5"        # Shares available to sell from T+2 afternoon
  short_selling: false            # Not legally permitted in Vietnam
  Vietnam Market Rules (HOSE/HNX):
  - Price limit: HOSE +/-7% / HNX +/-10% per session.
  - T+2.5 settlement: shares bought on T are only sellable from 13:00 on T+2.
    Do NOT generate sell signals for stocks bought within the last 2 trading days.
  - Lot size: all quantities must be multiples of 100 shares.
  - Short selling is not permitted. Long positions only.
