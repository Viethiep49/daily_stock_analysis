# Dragon Head Strategy / dau tuchien luoc
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: Co Phieu Dan Dat Nganh
description: Nhan dien co phieu dau nganh co xu huong tang manh.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
aliases: [dau tu, dau tuchien phap]
default_priority: 90
market_regimes: [sector_hot]

instructions: |
  **Chien luoc Co Phieu Dan Dat Nganh (Dragon Head Strategy)**

  Tieu chuan danh gia:

  1. **Vi tri dan dau nganh**:
     - Su dung `get_sector_rankings` kiem tra nganh cua co phieu co o vi tri tang truoc gan day khong.
     - Xac nhan co phieu co phai la nguoi khoi dong tang truoc trong chu ky nganh khong.

  2. **Ty le dao dong va dong luc**:
     - Su dung `get_realtime_quote` kiem tra ty le dao dong. Co phieu dan dau thuong ty le dao dong > 5%.
     - Khoi luong ty > 1.5 cho thay co ich giao dich hoat dong.

  3. **Do manh tuong doi**:
     - So sanh ty le thay doi cua co phieu voi muc trung binh nganh.
     - Co phieu dan dau that su ngay tang phai vuot nganh 2% tro len.

  4. **Xuc tac tin tuc**:
     - Su dung `search_stock_news` tim kiem xuc tac cap nganh (chinh sach, su kien, ket qua).
     - Gia dan dau thuong di kem xuc tac toan nganh.

  5. **Kiem tra ty le lech**:
     - Co phieu dan dau co the nhe ty le lech den 7%, nhung tren 10% van can than.

  ## Dieu chinh diem:
  - Xac nhan la co phieu dan dau: sentiment_score +10
  - Nganh dang o chu ky luu dong chu dong: cong them +5

# Vietnam market parameters (HOSE/HNX)
vn_market:
  price_limit_hose: 0.07          # HOSE daily limit +/-7%
  price_limit_hnx: 0.10           # HNX daily limit +/-10%
  lot_size: 100                   # Minimum lot = 100 shares
  settlement_rule: "T+2.5"        # Shares available to sell from T+2 afternoon
  short_selling: false            # Not legally permitted in Vietnam
  Vietnam Market Rules (HOSE/HNX):
  - Price limit: HOSE +/-7% / HNX +/-10% per session.
  - T+2.5 settlement: shares bought on T are only sellable from 13:00 on T+2.
    Do NOT generate sell signals for stocks bought within the last 2 trading days.
  - Lot size: all quantities must be multiples of 100 shares.
  - Short selling is not permitted. Long positions only.
