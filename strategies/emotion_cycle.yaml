# Sentiment Cycle Strategy / Chu ky cam xuc
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: Chu Ky Cam Xuc Thi Truong
description: Tim diem mua khi thi truong so hai qua muc.
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news
aliases: [cam xuc, Chu ky cam xuc]
default_priority: 100
market_regimes: [sector_hot]

instructions: |
  **Chien luoc Chu ky Cam Xuc Thi Truong (Sentiment Cycle Strategy)**

  Triet ly cua chien luoc: Cam xuc cua nguoi tham gia thi truong dao dong theo vong
  "hoang so -> bi quan -> nghi ngo -> hy vong -> lac quan -> hung phan -> tham lam -> cuong nhiet".
  Nha dau tu thong minh xep hang o day hoang so va thoai khoi o dinh cuong nhiet.

  ## Chi so luong hoa cac giai doan cam xuc

  ### Buoc 1: Phan tich ty le dao dong (chi so nhiet cam xuc chinh)
  Su dung `get_daily_history` va `get_realtime_quote`:

  - **Ty le dao dong < 0.5%/ngay**: Thi truong lanh le, khong ai chu y, vung day tiem an (mua khi nguoi khac hoang so).
  - **Ty le dao dong 0.5%~2%**: Giao dich binh thuong, cam xuc on dinh.
  - **Ty le dao dong 2%~5%**: Hoat dong, thi truong bat dau chu y, khong nen duoi theo gia.
  - **Ty le dao dong > 5%**: Nhiet do cao, von tam / nha dau tu le a o, canh giac dinh cam xuc.
  - **Ty le dao dong > 10% (trung binh ngay)**: Qua nhiet qua muc, thuong la dinh ngan han.

  ### Buoc 2: Xu huong lien tuc cua ty le dao dong
  Su dung `get_daily_history` tinh toan xu huong ty le dao dong 20 ngay gan nhat:
  - Tu cao xuong thap (giam dan) + khoi luong co lai -> Cam xuc roi dan, kien nhan cho.
  - Tu thap len cao (tang toc) + khoi luong tang dot bien -> Cam xuc bat dau, co the tham gia.
  - Dot bien khoi luong mot ngay (ty le dao dong vuot 5 lan muc truoc) -> Thuong la thoai hang chu luc, can canh giac.

  ### Buoc 3: Phan tich cam xuc tu tin tuc
  Su dung `search_stock_news` tim kiem tin tuc gan day, phan tich huong cam xuc:
  - Tin tuc tap trung "loi ich thuc hien, ket qua kinh doanh vuot mong doi, tran giam khoa, co cau khuyen nghi" -> Cam xuc co the qua nhiet.
  - Tin tuc tap trung "ket qua kinh doanh giam, bat loi, pha vo ho tro" -> Cam xuc bi quan co the tao nen day.
  - Dien dan nha dau tu le / mang xa hoi cam xuc cuc tieu cuc -> Chi bao nguoc, co the gan day.

  ### Buoc 4: MA thut hep va do dong bien
  Su dung `analyze_trend`:
  - MA5/MA10/MA20 ba duong hoi tu (MA thut hep) -> Chuan bi, huong cho xac dinh, cam xuc lanh le.
  - Do dong bien giam xuong muc thap (ATR co lai) -> Cam xuc cuc ky thap, chieu truoc bung no.

  ## Dac trung day cam xuc (vung mua)
  Dat it nhat 3 dieu sau:
  ✅ Ty le dao dong 20 ngay gan nhat o muc thap nhat trong 1 nam
  ✅ Khoi luong giam dan lien tuc, thap hon 50% khoi luong trung binh 60 ngay
  ✅ Tin tuc gan day phan lon la trung tinh, am thap hoac tieu cuc
  ✅ Gia co phan o gan hoac duoi MA20, nhung khong xay ra giam manh hoang so
  ✅ So huu co cau on dinh hoac tang nhe (neu co du lieu)

  ## Dac trung dinh cam xuc (vung giam canh co)
  Dat it nhat 3 dieu sau:
  ⚠️ Ty le dao dong 5 ngay > 2 lan muc trung binh 20 ngay
  ⚠️ Khoi luong phong to xung dot bien (mot ngay)
  ⚠️ Tin tuc chu yeu la loi ich thuc hien, muc tieu gia co cau tang manh, nha dau tu le duoi theo
  ⚠️ Gia co phan lech MA5 tren 8% (ty le lech cao)
  ⚠️ MACD xuat hien phan ky dinh

  ## Yeu cau dau ra
  - Xac dinh giai doan cam xuc hien tai: Day lanh le / On dinh / Khoi dong tham gia / Qua nhiet canh giac / Cuong nhiet dinh.
  - So sanh ty le dao dong hien tai voi muc trung binh 1 nam.
  - Co dat duoc dac trung day hoac dinh cam xuc khong (liet ke cac dieu dat).
  - Dua ra khuyen cao hanh dong nguoc cam xuc (dai da so hoang so thi tham lam, dai da so tham lam thi can than).

  ## Dieu chinh diem:
  - Dat du 3 dieu day cam xuc: `sentiment_score +14`
  - Dat du toan bo 5 dieu day cam xuc: `sentiment_score +20`
  - Dat du 3 dieu dinh cam xuc: `sentiment_score -12`
  - Dat du toan bo 5 dieu dinh cam xuc: `sentiment_score -20`
  - Khoang cam xuc on dinh: khong dieu chinh diem co so

# Vietnam market parameters (HOSE/HNX)
vn_market:
  price_limit_hose: 0.07          # HOSE daily limit +/-7%
  price_limit_hnx: 0.10           # HNX daily limit +/-10%
  lot_size: 100                   # Minimum lot = 100 shares
  settlement_rule: "T+2.5"        # Shares available to sell from T+2 afternoon
  short_selling: false            # Not legally permitted in Vietnam
  Vietnam Market Rules (HOSE/HNX):
  - Price limit: HOSE +/-7% / HNX +/-10% per session.
  - T+2.5 settlement: shares bought on T are only sellable from 13:00 on T+2.
    Do NOT generate sell signals for stocks bought within the last 2 trading days.
  - Lot size: all quantities must be multiples of 100 shares.
  - Short selling is not permitted. Long positions only.
