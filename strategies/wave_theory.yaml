instructions: |
  **Ly thuyet Song Elliott (Elliott Wave Theory)**

  Nguyen tac chinh: Thi truong hoat dong theo cau truc vong 5 song day + 3 song dieu chinh.

  ## Buoc phan tich

  ### 1. Nhan dien song hien tai
  Su dung `get_daily_history` lay du lieu 120 ngay, ket hop `analyze_trend` du lieu xu huong:

  **Dac trung nhan dien song day (1-3-5)**:
  - Song 1: Song dau tien cua dao nguoc xu huong, khoi luong tang nhe.
  - Song 3: Song day manh nhat, thuong khoi luong lon, MACD manh; khong bao gio la song ngan nhat.
  - Song 5: Nang luong thuong yeu hon song 3, xuat hien phan ky dinh thi sau khi tang se ket thuc.

  **Dac trung nhan dien song dieu chinh (A-B-C)**:
  - Song A: Lan giam dau tien, khoi luong lon, nhieu nguoi nghi la dieu chinh.
  - Song B: Hoi phuc, luc yeu hon phien tang truoc, khoi luong co lai, nguy co bay cao.
  - Song C: Lan giam thu hai, luc thuong vuot song A, hoan thanh dieu chinh.

  ### 2. Xac dinh vi tri vang
  - Song 2 dieu chinh thuong o 38.2%~61.8% cua song 1.
  - Muc tieu song 3 thuong la 1.618~2.618 lan keo dai song 1.
  - Song 4 khong duoc vao vung gia song 1 (vi pham quy tac song).
  - Muc tieu song C: Tinh tu dinh song A, bang hoac vuot do dai song A.

  ### 3. Diem mua tot nhat
  - **Song 2 dieu chinh on dinh** (hoang kim): Diem mua an toan nhat, dung sai o khoi dau song 1.
  - **Song 4 dieu chinh on dinh**: Thu hai, dung sai o dinh song 1.
  - **Dau song 3 vuot qua**: Khi tang luong vuot qua dinh song 1.
  - Tranh duoi theo o cuoi song 5 (nguy co phan ky dinh).

  ### 4. Canh bao rui ro
  - Song B hoi phuc khong nen canh nang (tinh chat bay).
  - Dem song co tinh chu quan, can ket hop chi ky thuat khac de xac nhan.
  - Neu quy tac song bi vi pham (vi du song 4 xam nhap song 1), can dem lai.

  ### 5. Yeu cau dau ra
  - Xac dinh vi tri song co the (vi du: "o giua song 3" hoac "co the song 4 dieu chinh").
  - Dua ra ho tro/khang cu Fibonacci chinh (0.382/0.618/1.618).
  - Mo ta hien tai la thoi diem mua, cho co hoi hay tranh.
  - Danh do tin cay dem song (cao/trung binh/thap).

  ## Dieu chinh diem:
  - Day song 2 on dinh (hoang kim): `sentiment_score +15`
  - Song 3 vuot qua xac nhan: `sentiment_score +12`
  - Cuoi song 5/phan ky dinh: `sentiment_score -10`
  - Song C dang giam: `sentiment_score -12`

