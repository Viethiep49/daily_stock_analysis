# Bottom Volume Surge Strategy / Khoi luong day
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: Day Bung No Khoi Luong
description: Phat hien tin hieu bung no khoi luong tai vung day sau xu huong giam keo dai.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [khoi luong day thay day, Khoi luong day]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **Day Bung No Khoi Luong (Bottom Volume Surge Strategy)**

  Tieu chuan xac dinh dao nguoc:

  1. **Xac nhan giam keo dai**:
     - Su dung `get_daily_history` (30 ngay).
     - Gia tu day cao 20 ngay den day thap gan nhat giam > 15%.
     - `analyze_trend` -> trend_status phai la BEAR hoac STRONG_BEAR.

  2. **Bien dong nang luong**:
     - Khoi luong ngay > 3 lan khoi luong trung binh 5 ngay.
     - Su dung `get_realtime_quote` -> volume_ratio > 3.0.
     - Bien dong nay xuat hien sau khi truoc do cuc ky co luong.

  3. **Gia on dinh**:
     - Ngay K-line dong cua tang (gia dong cua > gia mo cua).
     - Gia giu duoc day thap gan nhat.
     - Tot nhat xuat hien bong duoi dai, cho thay ho tro ben mua.

  4. **Yeu to xac nhan**:
     - Qua `search_stock_news` xac nhan co xuc tac co ban khong.
     - Phan bo chip: chi phi trung binh gan gia hien tai (hoi tu chi phi).

  5. **Canh bao rui ro**:
     - Day la tin hieu dao nguoc, rui ro cao hon theo doi xu huong.
     - De xuat canh co nhe (toi da 2-3 phan tram).
     - Dung sai phai nghiem ngat (o duoi day thap gan nhat).

  ## Dieu chinh diem:
  - Day bung no khoi luong xac nhan: sentiment_score +8
  - Kem theo nen tang + xuc tac tin tuc: cong them +5
  - Dung sai o day thap gan nhat.

# Vietnam market parameters (HOSE/HNX)
vn_market:
  price_limit_hose: 0.07          # HOSE daily limit +/-7%
  price_limit_hnx: 0.10           # HNX daily limit +/-10%
  lot_size: 100                   # Minimum lot = 100 shares
  settlement_rule: "T+2.5"        # Shares available to sell from T+2 afternoon
  short_selling: false            # Not legally permitted in Vietnam
  Vietnam Market Rules (HOSE/HNX):
  - Price limit: HOSE +/-7% / HNX +/-10% per session.
  - T+2.5 settlement: shares bought on T are only sellable from 13:00 on T+2.
    Do NOT generate sell signals for stocks bought within the last 2 trading days.
  - Lot size: all quantities must be multiples of 100 shares.
  - Short selling is not permitted. Long positions only.
